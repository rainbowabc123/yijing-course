    primary: brown
    accent: amber
  font:
    text: Noto Serif SC
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate

plugins:
  - search:
      lang: zh
  - encryptcontent:
      global_password: 'yijing2026'
      title_prefix: '🔒 '
      summary: '此内容已加密，请输入课程密码后查看。'
      placeholder: '请输入密码'
      decryption_failure_message: '密码错误，请重试。'
      encryption_info_message: '本课程内容受密码保护。'
      password_button: True
      password_button_text: '确认'

