site_name: ""
site_description: 易经个人成长课 · 判断力课 · 关系婚姻课 · 风水实用课
docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: overrides
  language: zh
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Noto Serif SC
  features:
    - navigation.tabs
    - navigation.expand
    - navigation.top
    - toc.integrate

extra_css:
  - stylesheets/custom.css

plugins:
  - search:
      lang: zh
  - encryptcontent:
      title_prefix: '🔒 '
      summary: '此内容已加密，请输入课程密码后查看。'
      placeholder: '请输入密码'
      decryption_failure_message: '密码错误，请重试。'
      encryption_info_message: '本课程内容受密码保护。'
      password_button: True
      password_button_text: '确认'
      remember_password: True
      session_storage: True

